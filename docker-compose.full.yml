# Full stack: lane + MSSQL + PostgreSQL + ClickHouse + MinIO
#
# Usage:
#   1. cp .env.example .env   (set all passwords)
#   2. docker compose -f docker-compose.full.yml up
#   3. Visit http://localhost:3401/setup to configure your admin account
#   4. Add connections through the UI or admin API

services:
  nginx:
    image: nginx:alpine
    ports:
      - "${LANE_BIND:-127.0.0.1}:3401:3401"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lane
    depends_on:
      - lane
    restart: unless-stopped

  lane:
    build: .
    volumes:
      - lane-data:/app/data
    environment:
      - LANE_DATA_DIR=/app/data
      - LANE_AUTH=${LANE_AUTH:-}
      - LANE_BASE_URL=${LANE_BASE_URL:-}
      - LANE_GOOGLE_CLIENT_ID=${LANE_GOOGLE_CLIENT_ID:-}
      - LANE_GOOGLE_CLIENT_SECRET=${LANE_GOOGLE_CLIENT_SECRET:-}
      - LANE_MICROSOFT_CLIENT_ID=${LANE_MICROSOFT_CLIENT_ID:-}
      - LANE_MICROSOFT_CLIENT_SECRET=${LANE_MICROSOFT_CLIENT_SECRET:-}
      - LANE_GITHUB_CLIENT_ID=${LANE_GITHUB_CLIENT_ID:-}
      - LANE_GITHUB_CLIENT_SECRET=${LANE_GITHUB_CLIENT_SECRET:-}
      - LANE_SMTP_HOST=${LANE_SMTP_HOST:-}
      - LANE_SMTP_PORT=${LANE_SMTP_PORT:-}
      - LANE_SMTP_USERNAME=${LANE_SMTP_USERNAME:-}
      - LANE_SMTP_PASSWORD=${LANE_SMTP_PASSWORD:-}
      - LANE_SMTP_FROM=${LANE_SMTP_FROM:-}
      - LANE_SMTP_TLS=${LANE_SMTP_TLS:-}
      # Use only to debug - LANE_LOG_LEVEL=info,lane=debug
    networks:
      - lane
    depends_on:
      mssql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env — requires uppercase, lowercase, number, and symbol}"
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - lane
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lane
    healthcheck:
      test: pg_isready -U postgres
      interval: 10s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:?Set CLICKHOUSE_PASSWORD in .env}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "127.0.0.1:8123:8123"    # HTTP interface
      - "127.0.0.1:9009:9000"    # Native TCP (remapped to avoid MinIO conflict)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - lane
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}"
    ports:
      - "127.0.0.1:9000:9000"    # S3 API
      - "127.0.0.1:9001:9001"    # Console
    volumes:
      - minio-data:/data
    networks:
      - lane
    healthcheck:
      test: curl -f http://localhost:9000/minio/health/live || exit 1
      interval: 10s
      timeout: 3s
      retries: 5

  # Mailpit — local SMTP trap for testing email code login
  # Uncomment to use, then set LANE_SMTP_HOST=mailpit, PORT=1025, TLS=none
  # Web UI: http://localhost:8025
  # mailpit:
  #   image: axllent/mailpit
  #   ports:
  #     - "0.0.0.0:8025:8025"    # Web UI
  #     - "127.0.0.1:1025:1025"  # SMTP
  #   networks:
  #     - lane

volumes:
  lane-data:
  mssql-data:
  postgres-data:
  clickhouse-data:
  minio-data:

networks:
  lane:
