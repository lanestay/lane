# Pre-built image from Docker Hub
#
# Usage:
#   1. cp .env.example .env   (set passwords for any services you enable)
#   2. docker compose -f docker-compose.prebuilt.yml up
#   3. tailscale serve --bg 3401
#   3. Visit your Tailscale URL /setup to configure your admin account
#   4. Add connections through the UI or admin API

services:
  lane:
    image: lanestay/lane:latest
    ports:
      - "${LANE_BIND:-127.0.0.1}:3401:3401"
    volumes:
      - lane-data:/app/data
    environment:
      - LANE_DATA_DIR=/app/data
      - LANE_AUTH=${LANE_AUTH:-tailscale}
      # Uncomment to enable OIDC providers (add google/microsoft/github to LANE_AUTH)
      # - LANE_BASE_URL=https://your-app.example.com
      # - LANE_GOOGLE_CLIENT_ID=
      # - LANE_GOOGLE_CLIENT_SECRET=
      # - LANE_MICROSOFT_CLIENT_ID=
      # - LANE_MICROSOFT_CLIENT_SECRET=
      # - LANE_GITHUB_CLIENT_ID=
      # - LANE_GITHUB_CLIENT_SECRET=
      # Uncomment to enable email code login (add email to LANE_AUTH)
      # - LANE_SMTP_HOST=smtp.gmail.com
      # - LANE_SMTP_PORT=587
      # - LANE_SMTP_TLS=starttls
      # - LANE_SMTP_FROM=noreply@yourdomain.com
      # - LANE_SMTP_USERNAME=
      # - LANE_SMTP_PASSWORD=
      # - LANE_LOG_LEVEL=info,lane=debug
    networks:
      - lane
    restart: unless-stopped

  # Optional — uncomment the databases and storage you need, then add them as
  # connections through the Lane UI or admin API.

